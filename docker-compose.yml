services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "5173:80"

  worker:
    build:
      context: ./worker
    env_file:
      - ./worker/.env
    restart: unless-stopped
